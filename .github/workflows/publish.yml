name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # required for SLSA provenance attestation
      attestations: write  # required for SLSA provenance attestation
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Full history + tags are required for poetry-dynamic-versioning
          # to derive the version from the git tag.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install poetry-dynamic-versioning plugin
        run: pipx inject poetry "poetry-dynamic-versioning[plugin]"

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Build sdist and wheel
        run: poetry build

      - name: Assert built version matches git tag
        # Only enforced when triggered by a tag push; manual dispatch builds
        # produce dev versions and skip the check.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BUILT_VERSION=$(ls dist/*.tar.gz | sed -E 's@.*/djura-(.+)\.tar\.gz@\1@')
          echo "Tag:   $TAG_VERSION"
          echo "Built: $BUILT_VERSION"
          if [ "$TAG_VERSION" != "$BUILT_VERSION" ]; then
            echo "::error::git tag ($TAG_VERSION) does not match built version ($BUILT_VERSION)"
            exit 1
          fi

      - name: Inspect sdist contents (fail on suspicious paths)
        run: |
          set -euo pipefail
          SDIST=$(ls dist/*.tar.gz)
          echo "Listing $SDIST"
          tar -tzf "$SDIST" | tee /tmp/sdist.list
          if grep -E '(^|/)(venv|htmlcov|dump|\.env|__pycache__|\.pytest_cache|\.mypy_cache|tests/)' /tmp/sdist.list; then
            echo "::error::sdist contains files that should be excluded"
            exit 1
          fi
          if grep -E '\.(pkl|pickle|pkl\.gz|pickle\.gz)$' /tmp/sdist.list; then
            echo "::error::sdist contains pickle artifacts"
            exit 1
          fi

      - name: Validate metadata with twine
        run: |
          pipx install twine
          twine check dist/*

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2.2.3
        with:
          subject-path: dist/*

      - name: Upload built distributions
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/djura
    permissions:
      id-token: write # required for trusted publishing (OIDC)
      contents: read
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc # v1.12.4
