name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12"]

        # python-version: ["3.10", "3.11", "3.12", "3.13"]
        # include:
        #   - os: macos-latest
        #     python-version: "3.12"
        #   - os: windows-latest
        #     python-version: "3.12"

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Full history + tags so poetry-dynamic-versioning can derive __version__.
          fetch-depth: 0

      - name: Install poetry-dynamic-versioning plugin
        run: pipx install poetry && pipx inject poetry "poetry-dynamic-versioning[plugin]"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Poetry
        run: poetry config virtualenvs.in-project true

      - name: Cache Poetry virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}

      - name: Cache NGA-West2 dataset
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/djura
          key: nga-west2-data-v1

      - name: Install dependencies
        run: poetry install --with dev --without docs --no-interaction

      - name: Lint (flake8)
        run: poetry run flake8 src tests

      - name: Run tests
        run: |
          poetry run pytest --cov=djura --cov-report=term-missing -m "not slow"

  build-check:
    name: Build & metadata check
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"

      - name: Install Poetry + dynamic versioning plugin
        run: pipx install poetry && pipx inject poetry "poetry-dynamic-versioning[plugin]"

      - name: Build sdist and wheel
        run: poetry build

      - name: Check metadata and README rendering
        run: |
          pipx install twine
          twine check --strict dist/*
