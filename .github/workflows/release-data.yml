name: Release data asset

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag for the data asset (e.g. data-v1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          lfs: false

      - name: Verify pickle exists
        run: |
          test -f src/djura/record_selection/assets/flatfile_shallow.pickle \
            || { echo "Pickle not found at src/djura/record_selection/assets/flatfile_shallow.pickle"; exit 1; }

      - name: Compress pickle
        run: |
          # -n strips the filename/timestamp header so the .gz is
          # byte-for-byte reproducible and its SHA-256 is stable.
          gzip -9 -nc src/djura/record_selection/assets/flatfile_shallow.pickle \
            > flatfile_shallow.pickle.gz
          ls -lh flatfile_shallow.pickle.gz
          sha256sum flatfile_shallow.pickle.gz

      - name: Create release and upload asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "Data release ${{ inputs.version }}" \
            --notes "Compressed record-selection dataset for djura. Consumed by djura.data_loader.load_data()." \
            flatfile_shallow.pickle.gz
