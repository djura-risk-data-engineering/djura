version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    pre_install:
      - pip install "poetry-core>=2.0.0,<3.0.0" "poetry-dynamic-versioning>=1.4.0,<2.0.0"

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: true

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - plot
    - requirements: docs/requirements.txt
